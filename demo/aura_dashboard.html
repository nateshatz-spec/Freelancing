<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraOS Demo | Aura App Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #3b82f6;
            --accent-purple: #8b5cf6;
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Ambient Glow */
        .ambient-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: -1;
            filter: blur(80px);
        }

        .dashboard {
            width: 95%;
            max-width: 1000px;
            background: var(--card);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 3rem;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            position: relative;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 4rem;
        }

        .user-info h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .user-info p {
            color: var(--text-dim);
            font-size: 1rem;
        }

        .pill-badge {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            padding: 6px 16px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 1px;
        }

        .dot-pulse {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 2.5rem;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
        }

        .main-card h3 {
            font-size: 1rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2rem;
        }

        .chart-frame {
            flex-grow: 1;
            height: 250px;
            display: flex;
            align-items: flex-end;
            gap: 15px;
            padding-top: 2rem;
        }

        .chart-bar {
            flex: 1;
            background: linear-gradient(to top, var(--accent), var(--accent-purple));
            border-radius: 12px 12px 4px 4px;
            position: relative;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            opacity: 0.4;
        }

        .chart-bar:hover {
            opacity: 1;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
            transform: scaleX(1.1);
        }

        .chart-bar::after {
            content: attr(data-value);
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .chart-bar:hover::after {
            opacity: 1;
        }

        .side-stack {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2rem;
            text-align: center;
            transition: transform 0.3s, border-color 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .stat-card .label {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 1rem;
            display: block;
        }

        .stat-card .value {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: block;
        }

        .stat-card .trend {
            font-size: 0.8rem;
            color: #10b981;
            font-weight: 600;
        }

        .trend.neutral { color: var(--accent); }

        /* Mobile Responsive */
        @media (max-width: 850px) {
            .grid-layout { grid-template-columns: 1fr; }
            .dashboard { padding: 2rem; border-radius: 0; min-height: 100vh; width: 100%; }
        }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>
    
    <div class="dashboard">
        <header>
            <div class="user-info">
                <h1>Infrastructure Health</h1>
                <p>Systems are operating at peak performance capacity.</p>
            </div>
            <div class="pill-badge">
                <div class="dot-pulse"></div>
                SYSTEMS ONLINE
            </div>
        </header>

        <div class="grid-layout">
            <div class="main-card">
                <h3>Request Velocity (Global)</h3>
                <div class="chart-frame">
                    <div class="chart-bar" style="height: 40%" data-value="4.2k"></div>
                    <div class="chart-bar" style="height: 65%" data-value="6.1k"></div>
                    <div class="chart-bar" style="height: 55%" data-value="5.8k"></div>
                    <div class="chart-bar" style="height: 92%" data-value="9.4k"></div>
                    <div class="chart-bar" style="height: 78%" data-value="8.2k"></div>
                    <div class="chart-bar" style="height: 85%" data-value="8.9k"></div>
                    <div class="chart-bar" style="height: 98%" data-value="10.2k"></div>
                </div>
            </div>

            <div class="side-stack">
                <div class="stat-card">
                    <span class="label">Response Time</span>
                    <span class="value">42ms</span>
                    <span class="trend">-12% (Better)</span>
                </div>
                <div class="stat-card">
                    <span class="label">Network Load</span>
                    <span class="value">Optimal</span>
                    <span class="trend neutral">STABLE</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Smooth entrance animation for bars
        document.addEventListener('DOMContentLoaded', () => {
            const bars = document.querySelectorAll('.chart-bar');
            bars.forEach((bar, index) => {
                const targetHeight = bar.style.height;
                bar.style.height = '0';
                setTimeout(() => {
                    bar.style.height = targetHeight;
                }, 200 + (index * 100));
            });
        });
    </script>
</body>
</html>
